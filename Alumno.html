<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Presencia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1d6fd4;--blue-light:#e8f1fb;--blue-dark:#0d4a99;
  --green:#1a7f4b;--green-light:#e6f4ec;
  --red:#c0392b;--red-light:#fdf0ef;
  --yellow:#b45309;--yellow-light:#fef9ee;
  --text:#0f172a;--text-mid:#475569;--text-muted:#94a3b8;
  --border:#e2e8f0;--bg:#f8fafc;--white:#ffffff;--radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;overflow-x:hidden}
body{display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available}
.header{background:var(--blue);color:white;padding:28px 24px 24px;padding-top:max(28px,env(safe-area-inset-top,28px));flex-shrink:0}
.header-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.65;margin-bottom:8px}
.header-title{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px}
.header-date{font-size:15px;opacity:.7;font-weight:400}
.info-bar{display:none;background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;flex-shrink:0}
.info-bar.visible{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.info-item{display:flex;flex-direction:column;gap:2px}
.info-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.info-value{font-size:16px;font-weight:700;color:var(--text)}
.info-value.timer{color:var(--blue);font-variant-numeric:tabular-nums;font-size:18px}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600}
.status-pill.ok{background:var(--green-light);color:var(--green)}
.status-pill.warn{background:var(--yellow-light);color:var(--yellow)}
.status-pill.err{background:var(--red-light);color:var(--red)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.main{flex:1;display:flex;flex-direction:column;padding:24px 20px;gap:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.search-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.search-box{position:relative}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--text-muted);pointer-events:none}
.search-input{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px 18px 18px 50px;font-family:inherit;font-size:18px;font-weight:500;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(29,111,212,.1)}
.list-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;flex:1;max-height:360px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.list-wrap::-webkit-scrollbar{width:4px}
.list-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.list-item{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--bg);cursor:pointer;transition:background .1s;gap:14px;user-select:none;-webkit-user-select:none}
.list-item:last-child{border-bottom:none}
.list-item:active{background:var(--blue-light)}
.list-item.selected{background:var(--blue-light);border-left:4px solid var(--blue)}
.list-avatar{width:44px;height:44px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.list-item.selected .list-avatar{background:var(--blue);color:white}
.list-nombre{font-size:17px;font-weight:600;color:var(--text);line-height:1.3}
.list-item.selected .list-nombre{color:var(--blue-dark)}
.list-legajo{font-size:12px;color:var(--text-muted);margin-top:2px}
.check-icon{margin-left:auto;width:28px;height:28px;border-radius:50%;background:var(--blue);color:white;display:none;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.list-item.selected .check-icon{display:flex}
.no-results{padding:32px 20px;text-align:center;color:var(--text-muted);font-size:16px}
.btn-confirm{width:100%;padding:22px;background:var(--blue);border:none;border-radius:var(--radius);color:white;font-family:inherit;font-size:20px;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:all .15s;-webkit-appearance:none;flex-shrink:0}
.btn-confirm:active:not([disabled]){transform:scale(.97);background:var(--blue-dark)}
.btn-confirm[disabled]{background:var(--border);color:var(--text-muted);cursor:not-allowed}
.success-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 24px;text-align:center;gap:0;background:var(--white)}
.success-circle{width:100px;height:100px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
.success-checkmark{width:48px;height:48px;color:var(--green)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-size:34px;font-weight:800;color:var(--green);letter-spacing:-.03em;margin-bottom:8px}
.success-subtitle{font-size:16px;color:var(--text-muted);margin-bottom:36px}
.success-card{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;text-align:left}
.success-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px}
.success-row:last-child{border-bottom:none}
.success-row-label{font-size:14px;color:var(--text-muted);font-weight:500}
.success-row-value{font-size:16px;font-weight:700;color:var(--text);text-align:right;max-width:60%}
.error-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 24px;text-align:center;background:var(--white)}
.error-circle{width:80px;height:80px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.error-icon{width:36px;height:36px;color:var(--red)}
.error-title{font-size:24px;font-weight:800;color:var(--red);margin-bottom:10px;letter-spacing:-.02em}
.error-msg{font-size:16px;color:var(--text-mid);line-height:1.6;max-width:300px}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">PRESENCIA &mdash; FAD UNCuyo</div>
  <div class="header-title">Marcar<br>Asistencia</div>
  <div class="header-date" id="fecha-sub">Cargando...</div>
</div>

<div class="info-bar" id="info-bar">
  <div class="info-item">
    <span class="info-label">Materia</span>
    <span class="info-value" id="inf-materia">—</span>
  </div>
  <div class="info-item">
    <span class="info-label">Clase</span>
    <span class="info-value" id="inf-clase">—</span>
  </div>
  <div class="info-item" style="align-items:flex-end">
    <span class="info-label">Expira en</span>
    <span class="info-value timer" id="inf-expira">—</span>
  </div>
</div>

<div class="main" id="main-content">
  <div id="status-wrap"></div>
  <div id="register-screen">
    <div class="search-label">Buscá tu nombre</div>
    <div class="search-box" style="margin-bottom:16px">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="name-search"
        placeholder="Escribí tu apellido..."
        oninput="filtrarNombres(this.value)"
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="list-wrap" id="names-list"></div>
    <div style="margin-top:20px">
      <button class="btn-confirm" id="btn-ok" disabled onclick="confirmar()">
        Confirmar presencia
      </button>
    </div>
  </div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-circle">
    <svg class="success-checkmark" viewBox="0 0 48 48" fill="none">
      <path d="M10 24l10 10L38 14" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="success-title">¡Presente!</div>
  <div class="success-subtitle">Tu asistencia fue registrada</div>
  <div class="success-card" id="suc-card"></div>
</div>

<div class="error-screen" id="error-screen">
  <div class="error-circle">
    <svg class="error-icon" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3"/>
      <path d="M24 14v12M24 32v2" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="error-title">Error</div>
  <div class="error-msg" id="error-detail">Ocurrió un problema</div>
</div>

<script>
var TOKEN = '<?= token ?>';
var SCRIPT_URL = '<?= ScriptApp.getService().getUrl() ?>'.split('?')[0];
var alumnos = [];
var selLegajo = null;
var selNombre = null;
var sesion = null;
var deviceId = null;

function getDeviceId() {
  var parts = [navigator.userAgent, screen.width+'x'+screen.height, screen.colorDepth,
    Intl.DateTimeFormat().resolvedOptions().timeZone, navigator.language,
    navigator.hardwareConcurrency||'', screen.pixelDepth||''];
  var str = parts.join('|'), hash = 0;
  for (var i = 0; i < str.length; i++) { hash = ((hash<<5)-hash)+str.charCodeAt(i); hash|=0; }
  return 'fp_'+Math.abs(hash).toString(36)+'_'+(screen.width*screen.height).toString(36);
}

function beep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function api(action, extra, callback) {
  fetch(SCRIPT_URL, {method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(Object.assign({action:action},extra||{}))})
    .then(function(r){return r.json();}).then(callback)
    .catch(function(e){callback({ok:false,error:e.message});});
}

function iniciales(nombre) {
  var parts = nombre.trim().split(/[\s,]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0]+(parts[1][0])).toUpperCase();
  return nombre.slice(0,2).toUpperCase();
}

window.onload = function() {
  deviceId = getDeviceId();
  var now = new Date();
  document.getElementById('fecha-sub').textContent =
    now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if (!TOKEN) { mostrarError('QR inválido.\nEscaneá el código QR que muestra el docente.'); return; }
  api('getSesionPorToken',{token:TOKEN}, function(rs) {
    if (!rs.ok) {
      mostrarError(rs.error==='QR expirado'
        ? 'Este QR ya expiró.\nEsperá el período de tardanza o pedile al docente que genere uno nuevo.'
        : (rs.error||'Sesión no encontrada.'));
      return;
    }
    sesion = rs.sesion;
    document.getElementById('inf-materia').textContent = sesion.materia||'—';
    document.getElementById('inf-clase').textContent = sesion.nombreClase||'Clase';
    document.getElementById('info-bar').classList.add('visible');
    actualizarTimer();
    api('buscarDispositivo', {deviceId: deviceId, materiaId: sesion.materiaId}, function(rb) {
      if (rb.ok && rb.alumno) {
        marcarAutomatico(rb.alumno.legajo, rb.alumno.nombre);
      } else {
        var sw = document.getElementById('status-wrap');
        sw.innerHTML = '<div class="status-pill ok"><span class="dot"></span>Primera vez — seleccioná tu nombre</div>';
        api('getAlumnos',{urlAlumnos:sesion.urlAlumnos||''}, function(ra) {
          if (ra.ok && ra.alumnos.length) { alumnos = ra.alumnos; renderNombres(''); }
          else mostrarError('No se pudo cargar la lista de alumnos.');
        });
      }
    });
  });
};

function marcarAutomatico(legajo, nombre) {
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('status-wrap').innerHTML =
    '<div style="text-align:center;padding:40px 20px">' +
    '<div class="list-avatar" style="width:72px;height:72px;font-size:22px;margin:0 auto 16px">'+iniciales(nombre)+'</div>' +
    '<div style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px">'+nombre+'</div>' +
    '<div style="font-size:15px;color:var(--text-muted)">Registrando asistencia...</div>' +
    '</div>';
  api('marcarPresente',{token:TOKEN,legajo:legajo,nombre:nombre,lat:0,lng:0,deviceId:deviceId}, function(r) {
    if (r.ok) { beep(); mostrarExito(legajo, nombre); }
    else {
      if (r.error && r.error.indexOf('Ya registraste') !== -1) { mostrarExito(legajo, nombre, true); }
      else {
        document.getElementById('register-screen').style.display = 'flex';
        document.getElementById('status-wrap').innerHTML = '<div class="status-pill err"><span class="dot"></span>'+r.error+'</div>';
      }
    }
  });
}

function mostrarExito(legajo, nombre, yaRegistrado) {
  document.getElementById('main-content').style.display='none';
  document.getElementById('info-bar').style.display='none';
  document.getElementById('success-screen').style.display='flex';
  var hora = new Date().toTimeString().slice(0,5);
  var extra = yaRegistrado ? row('Estado', '✓ Ya registrado anteriormente') : '';
  document.getElementById('suc-card').innerHTML =
    row('Alumno', nombre) + row('Hora', hora) +
    row('Materia', sesion?sesion.materia:'') + row('Aula', sesion?sesion.aula:'') +
    row('Clase', sesion?sesion.nombreClase:'') + extra;
}

function actualizarTimer() {
  var el = document.getElementById('inf-expira');
  var inter = setInterval(function() {
    var sec = Math.max(0,Math.floor((new Date(sesion.expira)-new Date())/1000));
    if (sec<=0) { el.textContent='Expirado'; el.style.color='var(--red)'; clearInterval(inter); return; }
    el.textContent = String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
  },1000);
}

function renderNombres(q) {
  var list = document.getElementById('names-list');
  var fil = q ? alumnos.filter(function(a){return a.nombre.toLowerCase().indexOf(q.toLowerCase())!==-1;}) : alumnos;
  if (!fil.length) { list.innerHTML='<div class="no-results">Sin resultados para "'+q+'"</div>'; return; }
  list.innerHTML = fil.map(function(a) {
    var sel = selLegajo===a.legajo;
    return '<div class="list-item'+(sel?' selected':'')+'" onclick="seleccionar(\''+a.legajo+'\',\''+a.nombre.replace(/'/g,"\\'")+'\')">'+
      '<div class="list-avatar">'+iniciales(a.nombre)+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="list-nombre">'+a.nombre+'</div>'+
        '<div class="list-legajo">Leg. '+a.legajo+'</div>'+
      '</div>'+
      '<div class="check-icon">&#10003;</div>'+
    '</div>';
  }).join('');
}

function filtrarNombres(q) { renderNombres(q); }

function seleccionar(leg, nom) {
  selLegajo = leg; selNombre = nom;
  renderNombres(document.getElementById('name-search').value);
  document.getElementById('btn-ok').disabled = false;
  document.getElementById('btn-ok').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function confirmar() {
  var btn = document.getElementById('btn-ok');
  btn.disabled = true; btn.textContent = 'Registrando...';
  api('marcarPresente',{token:TOKEN,legajo:selLegajo,nombre:selNombre,lat:0,lng:0,deviceId:deviceId}, function(r) {
    if (r.ok) {
      api('vincularDispositivo',{deviceId:deviceId,legajo:selLegajo,nombre:selNombre,materiaId:sesion.materiaId}, function(){});
      beep();
      mostrarExito(selLegajo, selNombre);
    } else {
      btn.disabled=false; btn.textContent='Confirmar presencia';
      document.getElementById('status-wrap').innerHTML='<div class="status-pill err"><span class="dot"></span>'+r.error+'</div>';
      window.scrollTo(0,0);
    }
  });
}

function row(label, value) {
  return '<div class="success-row"><span class="success-row-label">'+label+'</span><span class="success-row-value">'+value+'</span></div>';
}

function mostrarError(msg) {
  document.getElementById('main-content').style.display='none';
  document.getElementById('info-bar').style.display='none';
  document.getElementById('error-screen').style.display='flex';
  document.getElementById('error-detail').textContent = msg;
}
</script>
</body>
</html>
